mode: rule
mixed-port: 7897
allow-lan: false
log-level: info
ipv6: false
unified-delay: true
profile:
  store-selected: true
tun:
  enable: true
  stack: gvisor
  auto-route: true
  strict-route: false
  auto-detect-interface: true
  dns-hijack:
  - any:53
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  nameserver:
  - https://1.1.1.1/dns-query
  - https://dns.google/dns-query
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - localhost
proxy-providers:
  WgetCloud-CAMX:
    type: http
    url: "https://bava8u2znaj6bdzzjnfb.wgetcloud.online/link/4a0b995e-f365-3f58-b703-d333f3a0f5c4?target=clash"
    interval: 86400
    path: ./providers/wgetcloud_camx.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
