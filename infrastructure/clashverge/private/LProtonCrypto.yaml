  type: url-test
  url: http://www.gstatic.com/generate_204
  expected-status: '204'
  interval: 60
  timeout: 5000
  max-failed-times: 3
  lazy: false
  use:
  - WgetCloud-CAMX
  # binance fstream blocks US + Proton commercial VPN. Try Asia-Pacific + Canada.
  filter: "(?i)(canada|加拿大|🇨🇦|hong\\s?kong|香港|🇭🇰|singapore|新加坡|🇸🇬|japan|日本|🇯🇵|taiwan|台湾|🇨🇳\\s台湾|korea|韩国|🇰🇷)"
rules:
# === Binance fstream WebSocket (use CA/MX nodes — Proton blocked at data layer) ===
- DOMAIN-SUFFIX,fstream.binance.com,Crypto-Fstream-CAMX
- DOMAIN-SUFFIX,dstream.binance.com,Crypto-Fstream-CAMX
- DOMAIN-SUFFIX,fstream-mm.binance.com,Crypto-Fstream-CAMX
- DOMAIN-SUFFIX,fstream-auth.binance.com,Crypto-Fstream-CAMX
# === Binance core domains (web, app, API, WebSocket, CDN) ===
- DOMAIN-SUFFIX,binance.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,binancefuture.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.vision,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.info,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.me,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.cc,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.charity,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.org,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance.exchange,Crypto-Tier1-New
- DOMAIN-SUFFIX,binancezh.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,binance-cdn.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,bnbstatic.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,bnbusercontent.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,bntrace.com,Crypto-Tier1-New
# === Binance.app desktop client traffic also uses CloudFront edges ===
# (These IP-CIDR rules catch direct-IP connections that bypass DNS-based matching)
- IP-CIDR,18.64.0.0/14,Crypto-Tier1-New,no-resolve
- IP-CIDR,108.138.0.0/16,Crypto-Tier1-New,no-resolve
- IP-CIDR,52.84.0.0/15,Crypto-Tier1-New,no-resolve
- IP-CIDR,3.5.0.0/19,Crypto-Tier1-New,no-resolve
# === OKX ===
- DOMAIN-SUFFIX,okx.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,okx-dns.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,okxcdn.com,Crypto-Tier1-New
- DOMAIN-SUFFIX,okx.com.cdn.cloudflare.net,Crypto-Tier1-New
- DOMAIN-SUFFIX,oklink.com,Crypto-Tier1-New
- MATCH,DIRECT
