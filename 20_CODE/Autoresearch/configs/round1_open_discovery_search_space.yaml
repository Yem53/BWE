version: 2026-04-24-round1
scope:
  project: BWE three-channel trigger strategy AutoResearch
  mode: sandbox_backtest_paper_only
  channels:
    - BWE_OI_Price_monitor
    - BWE_pricechange_monitor
    - BWE_Reserved6
  historical_inputs:
    forward_parquet: /Users/ye/.hermes/research/bwe_three_channel_fullrun3/forward.parquet
    hourly_parquet: /Users/ye/.hermes/research/bwe_three_channel_fullrun3/event_hourly_2h_pre_48h_post.parquet
    next_optimization_dir: /Users/ye/.hermes/research/bwe_next_optimization_20260424
  write_outputs_under:
    - /Users/ye/.hermes/research/bwe_autoresearch_sandbox_20260424
    - /Users/ye/Desktop/GitHub/Autoresearch
hard_boundaries:
  no_live_config_changes: true
  no_orders: true
  no_live_endpoint_calls: true
  no_secret_dumping: true
  no_launchd_or_process_restart: true
  no_strategy_auto_promotion_to_live: true
strategy_definition:
  pure_parameter_tweak_is_new_strategy: false
  new_strategy_requires:
    - explainable_new_alpha_or_entry_logic
    - or_material_exit_or_risk_logic_that_changes_distribution
    - structured_candidate_schema
    - uses_only_entry_time_fields
    - event_study_directionality
    - walk_forward_survival
    - parameter_neighborhood_stability
    - outlier_removal_survival
    - fee_slippage_stress_survival
search_budget:
  per_round:
    max_entry_hypotheses: 80
    max_exit_variants_per_entry: 8
    max_filter_variants_per_combo: 5
    max_total_combinations: 1500
  allocation:
    known_family_refinement_pct: 70
    controlled_new_strategy_discovery_pct: 20
    contrarian_exploratory_pct: 10
known_family_refinement:
  oi_price:
    candidate_families:
      - oi_overcrowded_pump_reversal_short
      - oi_overcrowded_crash_follow_short
      - oi_negative_oi_pump_reversal_short
      - oi_trend_up_all_reversal_short
    thresholds:
      oi_ratio_pct_gte: [8, 10, 15, 20]
      oi_change_pct_gte: [5, 10, 20, 30]
      day_change_pct_gte: [0, 10, 20, 30]
      move_pct_gte: [3, 5, 8, 12]
    directions: [short]
  pricechange:
    candidate_families:
      - pc_second_signal_cont_long
      - pc_third_plus_overheat_short
      - pc_crash_cont_short_highliq
      - pc_crash_bounce_long_filtered
      - pc_reserved6_confirm_fade_short
    thresholds:
      burst_seq_5m: [1, 2, 3]
      burst_count_5m: [1, 2, 3, 5]
      liquidity_bucket_in:
        - [mid, high]
        - [high]
      confirm_count_5m_gte: [0, 1, 2]
    directions: [long, short]
  reserved6:
    candidate_families:
      - r6_bigmove_pump_fade_short
      - r6_bigmove_crash_cont_short
      - r6_oi_confirm_pump_fade_short
      - r6_bigmove_crash_bounce_long
    thresholds:
      move_pct_abs_gte: [5, 8, 10, 15]
      confirm_count_5m_gte: [0, 1]
      liquidity_bucket_in:
        - [mid, high]
        - [high]
    directions: [short, long]
open_discovery_categories:
  entries:
    - continuation
    - reversal_fade
    - second_signal
    - burst_state
    - cross_channel_confirmation
    - regime_state
    - liquidity_marketcap_bucket
    - delayed_confirmation
  exits:
    - fixed_horizon
    - fixed_tp_sl
    - short_event_hold
    - prove_then_exit
    - prove_then_runner
    - prove_then_hourly_state
    - partial_tp_runner
    - time_decay_target
    - ratchet_lock
    - volatility_adaptive_exit
    - channel_invalidated_exit
    - cross_confirm_hold_exit
    - left_tail_guard_exit
entry_delays_s: [0, 10, 30, 60, 180]
holding_horizons_min: [1, 3, 5, 10, 15, 30, 60]
filters:
  trend_state:
    - trend_up_all
    - trend_down_all
    - short_up_long_down
    - short_down_long_up
    - mixed
  regime_state:
    - risk_on
    - neutral
    - risk_off
  liquidity_bucket:
    - low
    - mid
    - high
  cross_channel_flags:
    - confirm_within_5m_pricechange
    - confirm_within_5m_reserved6
    - confirm_within_5m_oi
    - confirm_before_5m_pricechange
    - confirm_before_5m_reserved6
    - confirm_before_5m_oi
    - confirm_after_5m_pricechange
    - confirm_after_5m_reserved6
    - confirm_after_5m_oi
promotion_categories:
  - promote_to_paper
  - watchlist
  - need_more_data
  - reject
